    - data:
        code: |
          import json


          def main(preview_text: str = "") -> dict:
              text = (preview_text or "").strip()
              if not text:
                  return {
                      "preview_ok": "false",
                      "preview_summary": "",
                      "preview_error": "preview_intent 未返回内容。"
                  }

              try:
                  obj = json.loads(text)
              except Exception as ex:
                  return {
                      "preview_ok": "false",
                      "preview_summary": "",
                      "preview_error": f"preview_intent 返回的不是合法 JSON：{ex}"
                  }

              if not obj.get("ok", False):
                  message = str(obj.get("message", "预演失败")).strip()
                  details = str(obj.get("details", "") or "").strip()
                  error_text = message if not details else f"{message}；{details}"
                  return {
                      "preview_ok": "false",
                      "preview_summary": "",
                      "preview_error": error_text
                  }

              data = obj.get("data", {})
              preview = data.get("preview", {})
              messages = preview.get("messages", []) or []
              summary = "；".join(str(item) for item in messages[:5]).strip()
              if not summary:
                  summary = "预演成功。"

              return {
                  "preview_ok": "true",
                  "preview_summary": f"预演成功，未提交。{summary}",
                  "preview_error": ""
              }
