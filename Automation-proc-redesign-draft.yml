    - data:
        agent_parameters:
          instruction:
            type: constant
            value: |
              你是 Automation 路由 Agent。

              你的职责：
              1. 判断当前请求属于查询、修改、需要澄清还是不支持。
              2. 只输出一个 JSON 对象，不要输出 Markdown 代码块。

              你必须输出：
              {
                "route": "read_only|modify_request|clarify_needed|unsupported",
                "message": "给用户的简短说明"
              }

              规则：
              1. 如果用户明确要求修改流程、步骤、指令或字段，route=modify_request。
              2. 如果用户只是查看、分析、解释，route=read_only。
              3. 如果用户想修改但目标不明确，route=clarify_needed。
              4. 如果请求超出流程读取/修改范围，route=unsupported。
              5. 不调用任何工具。
          maximum_iterations:
            type: constant
            value: 3
          mcp_prompts_as_tools:
            type: constant
            value: false
          mcp_resources_as_tools:
            type: constant
            value: false
          mcp_servers_config:
            type: constant
            value: ''
          model:
