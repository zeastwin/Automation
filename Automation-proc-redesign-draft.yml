    - data:
        code: |
          import json


          def _strip_code_fence(text: str) -> str:
              value = (text or "").strip()
              if value.startswith("```"):
                  lines = value.splitlines()
                  if len(lines) >= 2 and lines[-1].strip() == "```":
                      return "\n".join(lines[1:-1]).strip()
              return value


          def main(intent_text: str = "") -> dict:
              cleaned = _strip_code_fence(intent_text)
              if not cleaned:
                  return {
                      "intent_valid": "false",
                      "intent_json": "",
                      "intent_error_message": "IntentTemplateAgent 未输出中间意图 JSON。"
                  }

              try:
                  obj = json.loads(cleaned)
              except Exception as ex:
                  return {
                      "intent_valid": "false",
                      "intent_json": cleaned,
                      "intent_error_message": f"中间意图不是合法 JSON：{ex}"
                  }

              if not isinstance(obj, dict):
                  return {
                      "intent_valid": "false",
                      "intent_json": cleaned,
                      "intent_error_message": "中间意图必须是 JSON 对象。"
                  }

              intent_type = str(obj.get("intentType", "")).strip()
              if not intent_type:
                  return {
                      "intent_valid": "false",
                      "intent_json": cleaned,
                      "intent_error_message": "中间意图缺少 intentType。"
                  }

              required_keys = {
                  "update_proc_head_field": ["procIndex", "baseProcId", "fieldChanges"],
                  "update_step_field": ["procIndex", "baseProcId", "stepId", "fieldChanges"],
                  "update_operation_field": ["procIndex", "baseProcId", "stepId", "opId", "fieldChanges"],
                  "append_step": ["procIndex", "baseProcId"],
                  "insert_step": ["procIndex", "baseProcId", "insertIndex"],
                  "delete_step": ["procIndex", "baseProcId", "stepId"],
                  "move_step": ["procIndex", "baseProcId", "stepId", "targetIndex"],
                  "append_operation": ["procIndex", "baseProcId", "stepId", "operaType"],
                  "insert_operation": ["procIndex", "baseProcId", "stepId", "insertIndex", "operaType"],
                  "delete_operation": ["procIndex", "baseProcId", "stepId", "opId"],
                  "move_operation": ["procIndex", "baseProcId", "stepId", "opId", "targetIndex"],
              }

              if intent_type not in required_keys:
                  return {
                      "intent_valid": "false",
                      "intent_json": cleaned,
                      "intent_error_message": f"不支持的 intentType：{intent_type}"
                  }

              for key in required_keys[intent_type]:
                  if key not in obj:
                      return {
                          "intent_valid": "false",
                          "intent_json": cleaned,
                          "intent_error_message": f"中间意图缺少必填字段：{key}"
                      }

              for object_key in ("fieldChanges", "fieldValues"):
                  if object_key in obj and not isinstance(obj[object_key], dict):
                      return {
                          "intent_valid": "false",
                          "intent_json": cleaned,
                          "intent_error_message": f"{object_key} 必须是对象。"
                      }

              return {
                  "intent_valid": "true",
                  "intent_json": json.dumps(obj, ensure_ascii=False, separators=(",", ":")),
                  "intent_error_message": ""
              }
        code_language: python3
        desc: 预先拦截中间意图的 JSON 结构错误，减少无效 MCP 调用。
        outputs:
          intent_error_message:
            children: null
            type: string
          intent_json:
            children: null
            type: string
          intent_valid:
            children: null
            type: string
        selected: false
        title: IntentValidator
        type: code
        variables:
