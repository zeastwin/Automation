    - data:
        code: |
          import json


          def _strip_code_fence(text: str) -> str:
              value = (text or "").strip()
              if value.startswith("```"):
                  lines = value.splitlines()
                  if len(lines) >= 2 and lines[-1].strip() == "```":
                      return "\n".join(lines[1:-1]).strip()
              return value


          def main(route_text: str = "") -> dict:
              cleaned = _strip_code_fence(route_text)
              route = "clarify_needed"
              message = "请明确要查询或修改的流程、步骤、指令。"

              if cleaned:
                  try:
                      data = json.loads(cleaned)
                      if isinstance(data, dict):
                          value = str(data.get("route", "")).strip()
                          if value in ("read_only", "modify_request", "clarify_needed", "unsupported"):
                              route = value
                          message = str(data.get("message", "")).strip() or message
                  except Exception:
                      pass

              return {
                  "route": route,
                  "route_message": message
              }
        code_language: python3
        desc: 解析 RouterAgent 输出，防止路由 JSON 漂移。
        outputs:
