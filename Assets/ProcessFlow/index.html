<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>流程图</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #f8f9fd;
      --surface-brand: #eef1ff;
      --outline: #dfe4ee;
      --outline-strong: #c8d0de;
      --text: #202938;
      --text-2: #526075;
      --text-3: #7b8799;
      --brand: #526cf1;
      --brand-2: #4059db;
      --brand-soft: #e7ebff;
      --success: #26855a;
      --success-soft: #e8f6ee;
      --warning: #ad6c1d;
      --warning-soft: #fff4dc;
      --danger: #bd3d36;
      --danger-soft: #ffebe8;
      --purple: #7656cc;
      --shadow: 0 10px 30px rgba(29, 42, 67, .07), 0 2px 8px rgba(29, 42, 67, .04);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }
    button, input { font: inherit; }
    button { color: inherit; }
    .app { height: 100%; display: grid; grid-template-rows: 88px 68px minmax(0, 1fr); }
    .appbar {
      display: grid;
      grid-template-columns: auto minmax(300px, 1fr) auto;
      align-items: center;
      gap: 20px;
      padding: 0 24px;
      background: rgba(255,255,255,.96);
      border-bottom: 1px solid #edf0f5;
    }
    .back-button, .button, .icon-button, .chip, .ai-button {
      border: 1px solid var(--outline-strong);
      background: var(--surface);
      min-height: 40px;
      border-radius: 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 15px;
      cursor: pointer;
      transition: background .16s ease, border-color .16s ease, color .16s ease, transform .12s ease, box-shadow .16s ease;
      white-space: nowrap;
    }
    button:hover { background: #f1f3f8; border-color: #b7c1d2; }
    button:active { transform: translateY(1px); }
    button:focus-visible, input:focus-visible { outline: 3px solid rgba(82,108,241,.22); outline-offset: 2px; }
    .back-button { font-weight: 600; color: var(--text-2); padding-left: 13px; }
    .app-title { min-width: 0; }
    .title-row { display: flex; align-items: center; gap: 12px; }
    .brand-mark {
      width: 34px; height: 34px; border-radius: 11px;
      display: grid; place-items: center;
      color: white; background: linear-gradient(145deg, #617af8, #455ddf);
      box-shadow: 0 6px 16px rgba(82,108,241,.24);
    }
    h1 { margin: 0; font-size: 21px; letter-spacing: -.3px; }
    .breadcrumb { margin: 5px 0 0 46px; color: var(--text-3); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .header-meta { color: var(--text-3); font-size: 13px; text-align: right; margin-right: 14px; }
    .app-actions { display: flex; align-items: center; }
    .ai-button { border-color: transparent; color: var(--brand-2); background: var(--surface-brand); font-weight: 600; min-height: 44px; }
    .ai-button:hover { background: #dfe5ff; border-color: transparent; }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px 12px;
      overflow-x: auto;
      background: var(--bg);
    }
    .button.selected { color: var(--brand-2); border-color: var(--brand); background: var(--surface-brand); font-weight: 600; }
    .search {
      width: min(340px, 28vw); min-width: 220px; height: 42px;
      display: flex; align-items: center; gap: 9px;
      padding: 0 6px 0 14px;
      border: 1px solid transparent; border-radius: 14px;
      background: #eef1f6;
      transition: border-color .16s, background .16s, box-shadow .16s;
    }
    .search:focus-within { background: white; border-color: #aebafc; box-shadow: 0 0 0 3px rgba(82,108,241,.1); }
    .search input { flex: 1; min-width: 0; border: 0; outline: 0; background: transparent; color: var(--text); }
    .search input::placeholder { color: #8a95a6; }
    .search button { border: 0; background: transparent; width: 32px; height: 32px; padding: 0; border-radius: 10px; cursor: pointer; }
    .icon-button { width: 42px; padding: 0; font-size: 20px; }
    .chip { color: var(--text-2); }
    .chip.active { color: var(--brand-2); background: var(--surface-brand); border-color: #9eadfb; }
    .content {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 16px;
      padding: 0 20px 20px;
    }
    .card { min-width: 0; min-height: 0; background: var(--surface); border: 1px solid var(--outline); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .canvas-card { display: grid; grid-template-rows: 54px minmax(0,1fr); }
    .card-head { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 0 18px; border-bottom: 1px solid #eef1f5; }
    .card-title { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; }
    .card-hint { color: var(--text-3); font-size: 12px; white-space: nowrap; }
    .viewport { position: relative; overflow: hidden; background:
      radial-gradient(circle at 1px 1px, #dfe4ee 1px, transparent 1.2px) 0 0/24px 24px,
      linear-gradient(180deg, #fafbfe, #f7f9fc); }
    #graph { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
    #graph.dragging { cursor: grabbing; }
    .detail-card { display: grid; grid-template-rows: 70px minmax(0,1fr); }
    .detail-head { display: flex; align-items: center; gap: 12px; padding: 0 18px; border-bottom: 1px solid #eef1f5; }
    .detail-icon { width: 36px; height: 36px; border-radius: 11px; display: grid; place-items: center; color: var(--brand); background: var(--surface-brand); }
    .detail-title { font-size: 14px; font-weight: 700; }
    .detail-subtitle { margin-top: 3px; color: var(--text-3); font-size: 12px; }
    .detail-body { overflow: auto; padding: 20px 18px 28px; }
    .detail-empty h2, .detail-body h2 { margin: 0 0 10px; font-size: 18px; }
    .detail-empty p { color: var(--text-2); font-size: 13px; line-height: 1.8; }
    .node-summary { color: var(--text-2); font-size: 13px; line-height: 1.65; margin-bottom: 20px; }
    .section-title { margin: 20px 0 10px; color: var(--text); font-size: 12px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; }
    .field { padding: 9px 0; border-bottom: 1px solid #f0f2f6; }
    .field-label { color: var(--text-3); font-size: 11px; }
    .field-value { margin-top: 4px; color: var(--text-2); font-size: 13px; word-break: break-all; user-select: text; }
    .diagnostic { margin-top: 9px; padding: 11px 12px; border-radius: 11px; background: var(--warning-soft); color: #7a5017; font-size: 12px; line-height: 1.55; }
    .diagnostic.error { background: var(--danger-soft); color: var(--danger); }
    .overlay { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(248,250,253,.82); backdrop-filter: blur(3px); z-index: 4; }
    .overlay.visible { display: flex; }
    .loading-box, .empty-box { text-align: center; max-width: 520px; padding: 32px; }
    .spinner { width: 32px; height: 32px; margin: 0 auto 16px; border: 3px solid #dfe4ff; border-top-color: var(--brand); border-radius: 50%; animation: spin .8s linear infinite; }
    .empty-art { width: 64px; height: 64px; margin: 0 auto 15px; border-radius: 20px; display: grid; place-items: center; color: var(--brand); background: var(--surface-brand); }
    .empty-box h2 { margin: 0 0 9px; font-size: 19px; }
    .empty-box p { margin: 0; color: var(--text-2); line-height: 1.7; font-size: 13px; }
    .empty-box .button { margin-top: 20px; color: white; border-color: var(--brand); background: var(--brand); }
    .toast { position: fixed; left: 50%; bottom: 28px; transform: translate(-50%, 18px); padding: 11px 16px; border-radius: 12px; color: white; background: #303948; box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 20; }
    .toast.visible { opacity: 1; transform: translate(-50%, 0); }
    .toast.error { background: var(--danger); }
    .svg-group { fill: rgba(255,255,255,.78); stroke: #d7deea; stroke-width: 1.4; }
    .svg-group.disabled { fill: rgba(245,246,249,.8); stroke-dasharray: 7 5; }
    .group-title { fill: #66748a; font-size: 13px; font-weight: 600; }
    .edge { fill: none; stroke: #98a4b6; stroke-width: 2; vector-effect: non-scaling-stroke; }
    .edge.branch { stroke: var(--brand); }
    .edge.processStart { stroke: var(--success); }
    .edge.processStop, .edge.alarm, .edge.invalid { stroke: var(--danger); }
    .edge.processWait { stroke: var(--warning); }
    .edge.loop { stroke-width: 2.8; }
    .edge.disabled, .edge.dynamic { stroke-dasharray: 7 5; opacity: .7; }
    .edge-label { fill: #66748a; font-size: 12px; font-weight: 600; text-anchor: middle; paint-order: stroke; stroke: white; stroke-width: 5px; stroke-linejoin: round; }
    .node-shape { fill: white; stroke: #b9c3d2; stroke-width: 1.6; vector-effect: non-scaling-stroke; filter: drop-shadow(0 5px 8px rgba(40,54,82,.08)); transition: fill .15s, stroke .15s; }
    .node:hover .node-shape { stroke: var(--brand); fill: #fafbff; }
    .node.selected .node-shape { stroke: var(--brand); stroke-width: 3; fill: #f4f6ff; }
    .node.start .node-shape { stroke: var(--success); fill: var(--success-soft); }
    .node.end .node-shape { stroke: #77859a; fill: #f2f4f8; }
    .node.process .node-shape { stroke: #9eacf8; fill: #f7f8ff; }
    .node.dynamic .node-shape { stroke: var(--purple); fill: #f4efff; stroke-dasharray: 7 4; }
    .node.invalid .node-shape { stroke: var(--danger); fill: var(--danger-soft); }
    .node.unreachable .node-shape { stroke: var(--warning); fill: var(--warning-soft); }
    .node.disabled { opacity: .64; }
    .node.runtime .node-shape { stroke: var(--brand); stroke-width: 3.4; fill: #e8edff; filter: drop-shadow(0 0 10px rgba(82,108,241,.25)); }
    .node.runtime.alarm .node-shape { stroke: var(--danger); fill: var(--danger-soft); filter: drop-shadow(0 0 10px rgba(189,61,54,.25)); }
    .node.runtime.paused .node-shape { stroke: var(--warning); fill: var(--warning-soft); }
    .node-title { fill: var(--text); font-size: 14px; font-weight: 700; text-anchor: middle; pointer-events: none; }
    .node-subtitle { fill: var(--text-2); font-size: 11.5px; text-anchor: middle; pointer-events: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 1100px) {
      .content { grid-template-columns: minmax(0,1fr) 282px; }
      .header-meta { display: none; }
      .card-hint { display: none; }
    }
    @media (max-width: 820px) {
      .content { grid-template-columns: 1fr; }
      .detail-card { display: none; }
      .ai-button span { display: none; }
      .search { width: 230px; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; } }
  </style>
</head>
<body>
  <main class="app">
    <header class="appbar">
      <button id="back" class="back-button" aria-label="返回指令列表">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M20 12H5m0 0 6-6m-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        返回指令列表
      </button>
      <div class="app-title">
        <div class="title-row"><span class="brand-mark"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M5 6h7v12h7M5 6v5m7 1h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="5" cy="6" r="2" fill="currentColor"/><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="19" cy="18" r="2" fill="currentColor"/></svg></span><h1>流程图</h1></div>
        <div id="breadcrumb" class="breadcrumb">项目总览</div>
      </div>
      <div class="app-actions"><span id="headerMeta" class="header-meta"></span><button id="ai" class="ai-button"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="m12 3 1.3 4.7L18 9l-4.7 1.3L12 15l-1.3-4.7L6 9l4.7-1.3L12 3Zm7 11 .7 2.3L22 17l-2.3.7L19 20l-.7-2.3L16 17l2.3-.7L19 14Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg><span>AI 解读当前视图</span></button></div>
    </header>

    <nav class="toolbar" aria-label="流程图工具栏">
      <button id="project" class="button selected"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M5 6h7v12h7" stroke="currentColor" stroke-width="2"/><circle cx="5" cy="6" r="2" fill="currentColor"/><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="19" cy="18" r="2" fill="currentColor"/></svg>项目总览</button>
      <div class="search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="10.5" cy="10.5" r="6.5" stroke="#718096" stroke-width="1.8"/><path d="m15.5 15.5 5 5" stroke="#718096" stroke-width="1.8" stroke-linecap="round"/></svg><input id="searchInput" placeholder="搜索流程、步骤或指令" aria-label="搜索节点"><button id="searchButton" aria-label="执行搜索"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="m9 18 6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>
      <button id="fit" class="button"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="6" stroke="currentColor" stroke-width="1.7"/><circle cx="12" cy="12" r="2" stroke="currentColor" stroke-width="1.7"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>适应画布</button>
      <button id="zoomOut" class="icon-button" aria-label="缩小">−</button>
      <button id="zoomIn" class="icon-button" aria-label="放大">+</button>
      <button id="disabledChip" class="chip" aria-pressed="false">禁用项</button>
      <button id="alarmChip" class="chip" aria-pressed="false">报警分支</button>
    </nav>

    <section class="content">
      <article class="card canvas-card">
        <div class="card-head"><div class="card-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 6h7v12h7" stroke="#526cf1" stroke-width="2"/><circle cx="5" cy="6" r="2" fill="#526cf1"/><circle cx="12" cy="12" r="2" fill="#526cf1"/><circle cx="19" cy="18" r="2" fill="#526cf1"/></svg>流程画布</div><div class="card-hint">滚轮缩放 · 拖动画布 · 双击节点进入明细</div></div>
        <div id="viewport" class="viewport">
          <svg id="graph" role="img" aria-label="流程图画布"><defs>
            <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#98a4b6"/></marker>
            <marker id="arrowBrand" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#526cf1"/></marker>
            <marker id="arrowDanger" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#bd3d36"/></marker>
            <marker id="arrowSuccess" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#26855a"/></marker>
            <marker id="arrowWarning" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#ad6c1d"/></marker>
          </defs><g id="world"><g id="groupsLayer"></g><g id="edgesLayer"></g><g id="nodesLayer"></g></g></svg>
          <div id="loading" class="overlay"><div class="loading-box"><div class="spinner"></div><strong>正在生成流程图</strong><div style="margin-top:7px;color:var(--text-3);font-size:13px">读取当前配置并计算确定性运行路径…</div></div></div>
          <div id="empty" class="overlay"><div class="empty-box"><div class="empty-art"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M5 6h7v12h7" stroke="currentColor" stroke-width="2"/><circle cx="5" cy="6" r="2" fill="currentColor"/><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="19" cy="18" r="2" fill="currentColor"/></svg></div><h2 id="emptyTitle">项目中还没有流程</h2><p id="emptyText">返回指令列表创建第一个流程，保存后会自动生成图形。</p><button id="emptyBack" class="button">返回指令列表</button></div></div>
        </div>
      </article>
      <aside class="card detail-card">
        <div class="detail-head"><div class="detail-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M7 12h3l2-4 3 7 2-3h2M9 22h6m-3-4v4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><div class="detail-title">节点详情</div><div class="detail-subtitle">单击查看信息，双击打开对象</div></div></div>
        <div id="details" class="detail-body"><div class="detail-empty"><h2>选择一个节点</h2><p>单击画布中的节点，可在这里查看运行状态、稳定身份和结构诊断。<br><br>双击流程节点进入流程明细；双击指令节点会返回指令列表并定位当前对象。</p></div></div>
      </aside>
    </section>
  </main>
  <div id="toast" class="toast"></div>

  <script>
    (() => {
      const svgNs = 'http://www.w3.org/2000/svg';
      const state = { snapshot: null, runtimes: [], showDisabled: false, showAlarm: false, selectedId: null, layout: null, viewBox: null, dragging: false, dragStart: null, toastTimer: null };
      const el = id => document.getElementById(id);
      const graph = el('graph');
      const world = el('world');
      const groupsLayer = el('groupsLayer');
      const edgesLayer = el('edgesLayer');
      const nodesLayer = el('nodesLayer');

      function post(message) { window.chrome.webview.postMessage(JSON.stringify(message)); }
      function svgEl(name, attrs = {}) { const node = document.createElementNS(svgNs, name); Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value)); return node; }
      function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }
      function text(value) { return value == null ? '' : String(value); }
      function diagNodeIds() { return new Set((state.snapshot?.diagnostics || []).filter(d => d.nodeId && String(d.severity).toLowerCase() !== 'info').map(d => d.nodeId)); }

      function visibleData() {
        if (!state.snapshot) return { nodes: [], edges: [] };
        const diagnosticNodes = diagNodeIds();
        const nodes = state.snapshot.nodes.filter(n => !n.disabled || state.showDisabled || n.invalid || diagnosticNodes.has(n.id));
        const ids = new Set(nodes.map(n => n.id));
        const edges = state.snapshot.edges.filter(e => ids.has(e.sourceId) && ids.has(e.targetId)
          && (!e.disabled || state.showDisabled || e.invalid)
          && (!e.alarmPath || state.showAlarm || e.invalid));
        return { nodes, edges };
      }

      function nodeSize(node) {
        if (node.kind === 'start' || node.kind === 'end') return { w: 92, h: 52 };
        if (node.kind === 'process') return { w: 218, h: 82 };
        if (node.invalid || node.dynamic) return { w: 218, h: 78 };
        return { w: 190, h: 70 };
      }

      function layoutProject(nodes, edges) {
        const ranks = new Map(nodes.map(n => [n.id, 0]));
        for (let pass = 0; pass < nodes.length; pass++) {
          let changed = false;
          edges.filter(e => !e.loop && e.sourceId !== e.targetId).forEach(e => {
            const next = Math.min(nodes.length - 1, (ranks.get(e.sourceId) || 0) + 1);
            if (next > (ranks.get(e.targetId) || 0)) { ranks.set(e.targetId, next); changed = true; }
          });
          if (!changed) break;
        }
        const columns = new Map();
        nodes.forEach(n => { const rank = ranks.get(n.id) || 0; if (!columns.has(rank)) columns.set(rank, []); columns.get(rank).push(n); });
        const positions = new Map();
        let maxRows = 1;
        [...columns.entries()].sort((a,b) => a[0]-b[0]).forEach(([rank, column]) => {
          maxRows = Math.max(maxRows, column.length);
          column.sort((a,b) => (a.procIndex ?? 9999) - (b.procIndex ?? 9999) || text(a.label).localeCompare(text(b.label), 'zh-CN'));
          column.forEach((node, row) => {
            const size = nodeSize(node);
            positions.set(node.id, { x: 90 + rank * 300, y: 88 + row * 128, ...size });
          });
        });
        const maxRank = Math.max(0, ...ranks.values());
        return { positions, groups: [], bounds: { x: 34, y: 34, w: Math.max(430, maxRank * 300 + 370), h: Math.max(260, maxRows * 128 + 70) } };
      }

      function layoutProcess(nodes) {
        const positions = new Map();
        const groups = [];
        const snapshotGroups = state.snapshot.groups || [];
        const grouped = new Set();
        const rowPlans = snapshotGroups.map(group => {
          const members = nodes.filter(n => n.groupId === group.id).sort((a,b) => (a.opIndex ?? 0) - (b.opIndex ?? 0));
          members.forEach(n => grouped.add(n.id));
          return { group, members, width: Math.max(300, members.length * 220 + 54), height: members.length ? 128 : 92 };
        }).filter(plan => plan.members.length || state.showDisabled);
        const loose = nodes.filter(n => !grouped.has(n.id) && n.kind !== 'start' && n.kind !== 'end');
        if (loose.length) rowPlans.push({ group: { id: 'loose', label: '结构诊断', disabled: false }, members: loose, width: Math.max(300, loose.length * 220 + 54), height: 128 });
        const maxWidth = Math.max(440, ...rowPlans.map(p => p.width));
        const centerX = 70 + maxWidth / 2;
        let y = 74;
        nodes.filter(n => n.kind === 'start').forEach((node, i) => { const size = nodeSize(node); positions.set(node.id, { x: centerX - size.w/2 + i*110, y, ...size }); });
        y += 98;
        rowPlans.forEach(plan => {
          const gx = centerX - plan.width / 2;
          groups.push({ id: plan.group.id, label: plan.group.label, disabled: !!plan.group.disabled, x: gx, y, w: plan.width, h: plan.height });
          const total = plan.members.length * 190 + Math.max(0, plan.members.length - 1) * 30;
          let x = centerX - total / 2;
          plan.members.forEach(node => { const size = nodeSize(node); positions.set(node.id, { x, y: y + 42, ...size }); x += 220; });
          y += plan.height + 34;
        });
        nodes.filter(n => n.kind === 'end').forEach((node, i) => { const size = nodeSize(node); positions.set(node.id, { x: centerX - size.w/2 + i*110, y: y + 8, ...size }); });
        y += 92;
        return { positions, groups, bounds: { x: 24, y: 24, w: maxWidth + 92, h: Math.max(320, y + 36) } };
      }

      function edgeGeometry(edge, index, layout) {
        const s = layout.positions.get(edge.sourceId), t = layout.positions.get(edge.targetId);
        if (!s || !t) return null;
        if (edge.loop || t.y < s.y - 10 || t.x < s.x - 30) {
          const side = layout.bounds.x + layout.bounds.w - 18 + (index % 4) * 18;
          const sx = s.x + s.w, sy = s.y + s.h/2, tx = t.x + t.w, ty = t.y + t.h/2;
          return { d: `M${sx},${sy} C${side},${sy} ${side},${ty} ${tx},${ty}`, lx: side - 8, ly: (sy+ty)/2 };
        }
        const vertical = Math.abs(t.y - s.y) > Math.abs(t.x - s.x) * .45;
        if (vertical) {
          const sx = s.x+s.w/2, sy=s.y+s.h, tx=t.x+t.w/2, ty=t.y;
          const mid=(sy+ty)/2;
          return { d:`M${sx},${sy} C${sx},${mid} ${tx},${mid} ${tx},${ty}`, lx:(sx+tx)/2+8, ly:mid-4 };
        }
        const sx=s.x+s.w, sy=s.y+s.h/2, tx=t.x, ty=t.y+t.h/2, mid=(sx+tx)/2;
        return { d:`M${sx},${sy} C${mid},${sy} ${mid},${ty} ${tx},${ty}`, lx:mid, ly:(sy+ty)/2-7 };
      }

      function edgeClass(edge) { return ['edge', edge.kind || '', edge.alarmPath?'alarm':'', edge.disabled?'disabled':'', edge.dynamic?'dynamic':'', edge.invalid?'invalid':'', edge.loop?'loop':''].filter(Boolean).join(' '); }
      function edgeMarker(edge) { if (edge.invalid || edge.alarmPath || edge.kind === 'processStop') return 'url(#arrowDanger)'; if (edge.kind === 'branch') return 'url(#arrowBrand)'; if (edge.kind === 'processStart') return 'url(#arrowSuccess)'; if (edge.kind === 'processWait') return 'url(#arrowWarning)'; return 'url(#arrow)'; }
      function runtimeForNode(node) {
        if (state.snapshot.scope === 'project') return state.runtimes.find(r => r.procId === node.procId && r.state !== 'Stopped');
        const runtime = state.runtimes.find(r => r.procIndex === state.snapshot.procIndex);
        if (!runtime || runtime.state === 'Stopped') return null;
        if (runtime.procId !== state.snapshot.procId || runtime.publishedRevision !== runtime.appliedRevision) return null;
        return node.stepIndex === runtime.stepIndex && node.opIndex === runtime.opIndex ? runtime : null;
      }
      function nodeClass(node) {
        const runtime = runtimeForNode(node);
        return ['node', node.kind || '', node.id===state.selectedId?'selected':'', node.disabled?'disabled':'', node.invalid?'invalid':'', node.dynamic?'dynamic':'', !node.reachable&&node.kind==='operation'?'unreachable':'', runtime?'runtime':'', runtime?.isAlarm?'alarm':'', runtime?.state==='Paused'?'paused':''].filter(Boolean).join(' ');
      }

      function splitLabel(value, max = 12) {
        const source = text(value).trim();
        if (source.length <= max) return [source];
        return [source.slice(0,max), source.slice(max,max*2) + (source.length>max*2?'…':'')];
      }

      function drawNode(node, pos) {
        const group = svgEl('g', { class: nodeClass(node), transform:`translate(${pos.x} ${pos.y})`, tabindex:'0', role:'button', 'data-node-id':node.id, 'aria-label':node.label || node.id });
        const isTerminal = node.kind === 'start' || node.kind === 'end';
        const shape = svgEl(isTerminal ? 'rect' : 'rect', { class:'node-shape', x:0, y:0, width:pos.w, height:pos.h, rx:isTerminal?26:14, ry:isTerminal?26:14 });
        group.appendChild(shape);
        const lines = splitLabel(node.label || node.id, node.kind === 'process' ? 15 : 11);
        const title = svgEl('text', { class:'node-title', x:pos.w/2, y: lines.length===1 ? 31 : 25 });
        lines.forEach((line,i) => { const span=svgEl('tspan',{x:pos.w/2,dy:i===0?0:18}); span.textContent=line; title.appendChild(span); });
        group.appendChild(title);
        let subtitle = '';
        if (node.kind === 'process') subtitle = [node.summary, node.autoStart?'自启动':''].filter(Boolean).join(' · ');
        else if (node.kind === 'operation' && node.operaType && node.label !== node.operaType) subtitle = node.operaType;
        else if ((node.invalid || node.dynamic) && node.summary) subtitle = node.summary;
        if (subtitle) { const sub=svgEl('text',{class:'node-subtitle',x:pos.w/2,y:pos.h-13}); sub.textContent=subtitle.length>24?subtitle.slice(0,23)+'…':subtitle; group.appendChild(sub); }
        group.addEventListener('click', event => { event.stopPropagation(); selectNode(node.id); });
        group.addEventListener('dblclick', event => { event.stopPropagation(); openNode(node); });
        group.addEventListener('keydown', event => { if(event.key==='Enter'){ event.preventDefault(); openNode(node); } });
        nodesLayer.appendChild(group);
      }

      function render(fitAfter = true) {
        if (!state.snapshot) return;
        const {nodes, edges} = visibleData();
        clear(groupsLayer); clear(edgesLayer); clear(nodesLayer);
        if (!nodes.length) { showEmpty('项目中还没有流程','返回指令列表创建第一个流程，流程图会在保存后自动生成。'); updateMeta(nodes,edges); return; }
        hideEmpty();
        state.layout = state.snapshot.scope === 'project' ? layoutProject(nodes,edges) : layoutProcess(nodes);
        state.layout.groups.forEach(group => {
          const rect=svgEl('rect',{class:'svg-group'+(group.disabled?' disabled':''),x:group.x,y:group.y,width:group.w,height:group.h,rx:18,ry:18}); groupsLayer.appendChild(rect);
          const label=svgEl('text',{class:'group-title',x:group.x+17,y:group.y+25}); label.textContent=group.label || '未命名步骤'; groupsLayer.appendChild(label);
        });
        edges.forEach((edge,index) => { const geometry=edgeGeometry(edge,index,state.layout); if(!geometry)return; const path=svgEl('path',{class:edgeClass(edge),d:geometry.d,'marker-end':edgeMarker(edge)}); edgesLayer.appendChild(path); if(edge.label){const label=svgEl('text',{class:'edge-label',x:geometry.lx,y:geometry.ly});label.textContent=edge.label;edgesLayer.appendChild(label);} });
        nodes.forEach(node => drawNode(node,state.layout.positions.get(node.id)));
        updateMeta(nodes,edges); updateDetails();
        if (fitAfter) requestAnimationFrame(fitGraph);
      }

      function updateMeta(nodes, edges) {
        const s=state.snapshot;
        const hiddenDisabled=state.showDisabled?0:(s.nodes.filter(n=>n.disabled&&!n.invalid).length+s.edges.filter(e=>e.disabled&&!e.invalid).length);
        const hiddenAlarm=state.showAlarm?0:s.edges.filter(e=>e.alarmPath&&!e.invalid).length;
        const runtime=state.runtimes.find(r=>r.procIndex===s.procIndex);
        const oldRevision=s.scope==='process'&&runtime&&runtime.publishedRevision!==runtime.appliedRevision;
        const parts=[`${nodes.length} 个节点`,`${edges.length} 条连线`];
        if(hiddenDisabled)parts.push(`隐藏 ${hiddenDisabled} 个禁用项`); if(hiddenAlarm)parts.push(`隐藏 ${hiddenAlarm} 条报警分支`); if(s.diagnostics.length)parts.push(`${s.diagnostics.length} 条诊断`); if(oldRevision)parts.push('当前实例运行旧版本');
        el('headerMeta').textContent=parts.join(' · ');
        el('breadcrumb').textContent=s.scope==='project'?'项目总览':`项目总览  ›  ${s.name}  ·  流程 ${s.procIndex}`;
        el('project').classList.toggle('selected',s.scope==='project');
      }

      function fitGraph() {
        if (!state.layout) return;
        const b=state.layout.bounds, vw=Math.max(1,graph.clientWidth), vh=Math.max(1,graph.clientHeight), padding=44;
        let w=b.w+padding*2,h=b.h+padding*2,x=b.x-padding,y=b.y-padding;
        const target=vw/vh,current=w/h;
        if(current<target){const next=w= h*target;x=b.x+b.w/2-w/2;}else{h=w/target;y=b.y+b.h/2-h/2;}
        state.viewBox={x,y,w,h}; applyViewBox();
      }
      function applyViewBox(){const v=state.viewBox;if(v)graph.setAttribute('viewBox',`${v.x} ${v.y} ${v.w} ${v.h}`);}
      function zoom(factor, clientX=graph.clientWidth/2, clientY=graph.clientHeight/2){if(!state.viewBox)return;const v=state.viewBox,r=graph.getBoundingClientRect(),px=(clientX/r.width),py=(clientY/r.height),nw=Math.max(180,Math.min(10000,v.w*factor)),nh=nw*(v.h/v.w);v.x+=(v.w-nw)*px;v.y+=(v.h-nh)*py;v.w=nw;v.h=nh;applyViewBox();}
      function centerNode(id){const p=state.layout?.positions.get(id);if(!p||!state.viewBox)return;state.viewBox.x=p.x+p.w/2-state.viewBox.w/2;state.viewBox.y=p.y+p.h/2-state.viewBox.h/2;applyViewBox();}

      function selectNode(id){state.selectedId=id;post({action:'select',nodeId:id});nodesLayer.querySelectorAll('.node').forEach(n=>n.classList.toggle('selected',n.dataset.nodeId===id));updateDetails();}
      function openNode(node){if(node.kind==='process'&&node.procIndex!=null)post({action:'openProcess',procIndex:node.procIndex});else if(node.kind==='operation')post({action:'openOperation',procId:node.procId,stepId:node.stepId,opId:node.opId});}
      function addField(container,label,value){if(value==null||value==='')return;const field=document.createElement('div');field.className='field';const l=document.createElement('div');l.className='field-label';l.textContent=label;const v=document.createElement('div');v.className='field-value';v.textContent=String(value);field.append(l,v);container.appendChild(field);}
      function updateDetails(){const root=el('details'),node=state.snapshot?.nodes.find(n=>n.id===state.selectedId);root.replaceChildren();if(!node){const d=document.createElement('div');d.className='detail-empty';d.innerHTML='<h2>选择一个节点</h2><p>单击画布中的节点，可在这里查看运行状态、稳定身份和结构诊断。<br><br>双击流程节点进入流程明细；双击指令节点会返回指令列表并定位当前对象。</p>';root.appendChild(d);return;}const h=document.createElement('h2');h.textContent=node.label||'未命名节点';root.appendChild(h);if(node.summary){const s=document.createElement('div');s.className='node-summary';s.textContent=node.summary;root.appendChild(s);}const basic=document.createElement('div');basic.className='section-title';basic.textContent='基本信息';root.appendChild(basic);addField(root,'节点类型',node.kind);addField(root,'原生类型',node.operaType);addField(root,'运行状态',node.runtimeState);addField(root,'就绪状态',node.readinessStatus);addField(root,'禁用',node.disabled?'是':'否');addField(root,'可达',node.reachable?'是':'否');const identity=document.createElement('div');identity.className='section-title';identity.textContent='稳定身份';root.appendChild(identity);addField(root,'procId',node.procId);addField(root,'stepId',node.stepId);addField(root,'opId',node.opId);const diagnostics=(state.snapshot.diagnostics||[]).filter(d=>d.nodeId===node.id);if(diagnostics.length){const title=document.createElement('div');title.className='section-title';title.textContent='结构诊断';root.appendChild(title);diagnostics.forEach(d=>{const item=document.createElement('div');item.className='diagnostic '+(String(d.severity).toLowerCase()==='error'?'error':'');item.textContent=d.message;root.appendChild(item);});}}
      function applyRuntime(){if(!state.snapshot)return;nodesLayer.querySelectorAll('.node').forEach(element=>{const node=state.snapshot.nodes.find(n=>n.id===element.dataset.nodeId);if(node)element.setAttribute('class',nodeClass(node));});const data=visibleData();updateMeta(data.nodes,data.edges);}
      function search(){const term=el('searchInput').value.trim().toLocaleLowerCase('zh-CN');if(!term)return;const {nodes}=visibleData();const match=nodes.find(n=>[n.label,n.summary,n.operaType].some(v=>text(v).toLocaleLowerCase('zh-CN').includes(term)));if(!match){toast('没有找到匹配的节点',true);return;}selectNode(match.id);centerNode(match.id);}
      function showEmpty(title,message){el('emptyTitle').textContent=title;el('emptyText').textContent=message;el('empty').classList.add('visible');}
      function hideEmpty(){el('empty').classList.remove('visible');}
      function toast(message,error=false){const node=el('toast');node.textContent=message;node.classList.toggle('error',error);node.classList.add('visible');clearTimeout(state.toastTimer);state.toastTimer=setTimeout(()=>node.classList.remove('visible'),2600);}

      window.chrome.webview.addEventListener('message',event=>{const message=event.data;if(message.type==='loading'){el('loading').classList.add('visible');return;}if(message.type==='graph'){el('loading').classList.remove('visible');state.snapshot=message.snapshot;state.runtimes=message.runtimes||[];state.selectedId=null;render(true);return;}if(message.type==='runtime'){state.runtimes=message.runtimes||[];applyRuntime();return;}if(message.type==='toast'){toast(message.message,!!message.error);return;}if(message.type==='error'){el('loading').classList.remove('visible');showEmpty('流程图暂不可用',message.message);toast(message.message,true);}});
      el('back').addEventListener('click',()=>post({action:'back'})); el('emptyBack').addEventListener('click',()=>post({action:'back'})); el('project').addEventListener('click',()=>post({action:'project'})); el('ai').addEventListener('click',()=>post({action:'ai'})); el('fit').addEventListener('click',fitGraph); el('zoomIn').addEventListener('click',()=>zoom(.82)); el('zoomOut').addEventListener('click',()=>zoom(1.22)); el('searchButton').addEventListener('click',search); el('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')search();});
      el('disabledChip').addEventListener('click',event=>{state.showDisabled=!state.showDisabled;event.currentTarget.classList.toggle('active',state.showDisabled);event.currentTarget.setAttribute('aria-pressed',String(state.showDisabled));render(true);});
      el('alarmChip').addEventListener('click',event=>{state.showAlarm=!state.showAlarm;event.currentTarget.classList.toggle('active',state.showAlarm);event.currentTarget.setAttribute('aria-pressed',String(state.showAlarm));render(true);});
      graph.addEventListener('wheel',event=>{event.preventDefault();zoom(event.deltaY<0?.88:1.14,event.clientX-graph.getBoundingClientRect().left,event.clientY-graph.getBoundingClientRect().top);},{passive:false});
      graph.addEventListener('pointerdown',event=>{if(event.button!==0)return;state.dragging=true;graph.classList.add('dragging');graph.setPointerCapture(event.pointerId);state.dragStart={x:event.clientX,y:event.clientY,v:{...state.viewBox}};});
      graph.addEventListener('pointermove',event=>{if(!state.dragging||!state.dragStart||!state.viewBox)return;const scaleX=state.dragStart.v.w/graph.clientWidth,scaleY=state.dragStart.v.h/graph.clientHeight;state.viewBox.x=state.dragStart.v.x-(event.clientX-state.dragStart.x)*scaleX;state.viewBox.y=state.dragStart.v.y-(event.clientY-state.dragStart.y)*scaleY;applyViewBox();});
      graph.addEventListener('pointerup',event=>{state.dragging=false;state.dragStart=null;graph.classList.remove('dragging');if(graph.hasPointerCapture(event.pointerId))graph.releasePointerCapture(event.pointerId);});
      graph.addEventListener('click',event=>{if(event.target===graph||event.target===world){state.selectedId=null;updateDetails();nodesLayer.querySelectorAll('.node').forEach(n=>n.classList.remove('selected'));}});
      window.addEventListener('resize',()=>{if(state.layout)fitGraph();});
      post({action:'ready'});
    })();
  </script>
</body>
</html>
