<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>运行时性能分析</title>
  <style>
    :root{color-scheme:light;--bg:#f3f6f9;--panel:#fff;--line:#dfe6ec;--text:#192633;--muted:#697988;--blue:#147ca8;--cyan:#29a8c7;--green:#16845b;--amber:#c47b16;--red:#c74747;--navy:#183247;--shadow:0 10px 26px rgba(28,51,68,.07)}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Microsoft YaHei UI","Segoe UI",sans-serif;color:var(--text);background:var(--bg)}
    body{padding:24px}.shell{max-width:1560px;margin:0 auto}.topbar{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:18px}
    h1{margin:0;font-size:25px;font-weight:700;letter-spacing:.02em}.subtitle{margin-top:5px;color:var(--muted);font-size:13px}.top-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .pill{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;border:1px solid var(--line);border-radius:999px;background:#fff;color:#465967;font-size:12px}.dot{width:8px;height:8px;border-radius:50%;background:#9daab4}.dot.live{background:#1ba66d;box-shadow:0 0 0 4px rgba(27,166,109,.12)}
    .notice{display:none;margin-bottom:16px;padding:13px 16px;border:1px solid #f0d39d;border-radius:10px;background:#fff8e9;color:#76511c;font-size:13px}.notice.show{display:block}.notice.danger{border-color:#efb6b6;background:#fff2f2;color:#8a3434}
    .kpis{display:grid;grid-template-columns:repeat(4,minmax(170px,1fr));gap:14px;margin-bottom:14px}.card,.panel{background:var(--panel);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow)}
    .card{padding:17px 18px}.card-label{color:var(--muted);font-size:12px}.card-value{margin-top:9px;font:700 27px/1.05 "Segoe UI",sans-serif;color:var(--navy);font-variant-numeric:tabular-nums}.card-note{margin-top:8px;color:#87949e;font-size:11px}
    .charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}.panel-head{display:flex;align-items:center;justify-content:space-between;padding:15px 17px 8px}.panel-title{font-weight:650;font-size:14px}.legend{display:flex;gap:13px;color:var(--muted);font-size:11px}.legend i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}.chart-wrap{height:210px;padding:0 13px 13px}canvas{display:block;width:100%;height:100%}
    .table-panel{overflow:hidden}.table-tools{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 17px;border-bottom:1px solid var(--line)}.summary{color:var(--muted);font-size:12px}.button{border:1px solid #cad6df;background:#fff;color:#3c5363;border-radius:7px;padding:6px 11px;font:12px inherit;cursor:pointer}.button:hover{border-color:#86aec1;color:#176f95}
    .table-scroll{overflow:auto;max-height:370px}table{width:100%;border-collapse:collapse;min-width:980px}th{position:sticky;top:0;z-index:1;padding:10px 13px;background:#f7f9fb;border-bottom:1px solid var(--line);color:#60717e;font-size:11px;font-weight:600;text-align:right;white-space:nowrap}th:first-child,th:nth-child(2),td:first-child,td:nth-child(2){text-align:left}td{padding:11px 13px;border-bottom:1px solid #edf1f4;text-align:right;font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap}.proc-name{font-weight:600;color:#253746}.proc-index{color:#8a98a2;margin-right:7px}.state{display:inline-flex;padding:3px 8px;border-radius:999px;background:#eef2f5;color:#586a77;font-size:11px}.state.running{background:#e8f6f0;color:#19734f}.state.alarming{background:#fff0f0;color:#a83e3e}.alert{display:inline-flex;align-items:center;gap:5px;color:var(--red);font-weight:600}.ok{color:#6f7e88}.empty{padding:48px;text-align:center;color:#7b8993}
    .foot{display:flex;justify-content:space-between;gap:16px;margin-top:12px;color:#7b8993;font-size:11px;line-height:1.6}
    @media(max-width:1050px){body{padding:15px}.kpis{grid-template-columns:1fr 1fr}.charts{grid-template-columns:1fr}.topbar{align-items:flex-start}.foot{flex-direction:column}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div><h1>运行时性能分析</h1><div class="subtitle">低频读取流程引擎已有采样，不产生逐指令 UI 事件</div></div>
      <div class="top-meta"><span class="pill" id="analysisPill">性能分析：--</span><span class="pill"><i class="dot" id="liveDot"></i><span id="updatedAt">等待数据</span></span></div>
    </header>
    <div class="notice" id="notice"></div>
    <section class="kpis">
      <article class="card"><div class="card-label">实时指令吞吐</div><div class="card-value" id="rate">0</div><div class="card-note">所有流程合计，指令/秒</div></article>
      <article class="card"><div class="card-label">流程线程 CPU</div><div class="card-value" id="cpu">0%</div><div class="card-note">各流程线程占用率合计</div></article>
      <article class="card"><div class="card-label">正在运行</div><div class="card-value" id="running">0</div><div class="card-note">非 Stopped 流程数量</div></article>
      <article class="card"><div class="card-label">异常高负载流程</div><div class="card-value" id="abnormal">0</div><div class="card-note">只报告，不自动终止流程</div></article>
    </section>
    <section class="charts">
      <article class="panel"><div class="panel-head"><span class="panel-title">吞吐趋势</span><span class="legend"><span><i style="background:#29a8c7"></i>指令/秒</span></span></div><div class="chart-wrap"><canvas id="rateChart"></canvas></div></article>
      <article class="panel"><div class="panel-head"><span class="panel-title">CPU 趋势</span><span class="legend"><span><i style="background:#c47b16"></i>线程 CPU 合计</span></span></div><div class="chart-wrap"><canvas id="cpuChart"></canvas></div></article>
    </section>
    <section class="panel table-panel">
      <div class="table-tools"><div><span class="panel-title">流程明细</span><span class="summary" id="tableSummary"></span></div><button class="button" id="resetHistory">清空趋势</button></div>
      <div class="table-scroll"><table><thead><tr><th>流程</th><th>状态</th><th>指令/秒</th><th>线程 CPU</th><th>平均耗时</th><th>最大耗时</th><th>抽样次数</th><th>累计指令</th><th>诊断</th></tr></thead><tbody id="processRows"></tbody></table><div class="empty" id="empty">当前没有流程快照</div></div>
    </section>
    <footer class="foot"><span>耗时使用抽样统计；页面刷新频率为 1Hz。趋势仅保存在当前页面内，关闭后释放。</span><span id="diagnosticPolicy">智能诊断状态：--</span></footer>
  </main>
  <script>
    const state={rate:[],cpu:[],maxPoints:120};
    const el=id=>document.getElementById(id);
    const fmt=(value,digits=0)=>{const n=Number(value)||0;if(Math.abs(n)>=1e9)return(n/1e9).toFixed(2)+'G';if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+'M';if(Math.abs(n)>=1e3)return(n/1e3).toFixed(1)+'K';return n.toFixed(digits)};
    const percent=value=>(Number(value)||0).toFixed(1)+'%';
    const micro=value=>{const n=Number(value)||0;return n>=1000?(n/1000).toFixed(2)+' ms':n.toFixed(n<10?2:1)+' μs'};
    function pushHistory(target,value){target.push(Number(value)||0);if(target.length>state.maxPoints)target.shift()}
    function drawChart(canvas,values,color,suffix){
      const box=canvas.getBoundingClientRect(),ratio=window.devicePixelRatio||1,w=Math.max(1,box.width),h=Math.max(1,box.height);canvas.width=w*ratio;canvas.height=h*ratio;const c=canvas.getContext('2d');c.scale(ratio,ratio);c.clearRect(0,0,w,h);
      const pad={l:48,r:13,t:12,b:24},cw=w-pad.l-pad.r,ch=h-pad.t-pad.b,max=Math.max(1,...values)*1.12;
      c.strokeStyle='#e5ebef';c.lineWidth=1;c.fillStyle='#80909b';c.font='11px Segoe UI';c.textAlign='right';c.textBaseline='middle';
      for(let i=0;i<=4;i++){const y=pad.t+ch*i/4;c.beginPath();c.moveTo(pad.l,y);c.lineTo(w-pad.r,y);c.stroke();c.fillText(fmt(max*(1-i/4),max<10?1:0)+(suffix||''),pad.l-7,y)}
      if(values.length<2)return;c.strokeStyle=color;c.lineWidth=2;c.lineJoin='round';c.beginPath();values.forEach((v,i)=>{const x=pad.l+cw*i/(state.maxPoints-1),y=pad.t+ch-(Math.min(max,v)/max)*ch;i?c.lineTo(x,y):c.moveTo(x,y)});c.stroke();
      const grad=c.createLinearGradient(0,pad.t,0,pad.t+ch);grad.addColorStop(0,color+'35');grad.addColorStop(1,color+'00');c.lineTo(pad.l+cw*(values.length-1)/(state.maxPoints-1),pad.t+ch);c.lineTo(pad.l,pad.t+ch);c.closePath();c.fillStyle=grad;c.fill();
    }
    function stateClass(value){return value==='Running'?'running':value==='Alarming'?'alarming':''}
    function cell(text,className){const td=document.createElement('td');td.textContent=text;if(className)td.className=className;return td}
    function renderRows(items){const body=el('processRows');body.replaceChildren();el('empty').style.display=items.length?'none':'block';items.forEach(p=>{
      const tr=document.createElement('tr'),name=document.createElement('td'),index=document.createElement('span'),label=document.createElement('span');index.className='proc-index';index.textContent='#'+p.index;label.className='proc-name';label.textContent=p.name;name.append(index,label);tr.appendChild(name);
      const stateTd=document.createElement('td'),badge=document.createElement('span');badge.className='state '+stateClass(p.state);badge.textContent=p.stateText;stateTd.appendChild(badge);tr.appendChild(stateTd);
      tr.appendChild(cell(fmt(p.operationsPerSecond)));tr.appendChild(cell(percent(p.threadCpuPercent)));tr.appendChild(cell(micro(p.averageOperationMicroseconds)));tr.appendChild(cell(micro(p.maxOperationMicroseconds)));tr.appendChild(cell(fmt(p.sampleCount)));tr.appendChild(cell(fmt(p.operationCount)));
      const diagnosis=document.createElement('td');diagnosis.className=p.abnormal?'alert':'ok';diagnosis.textContent=p.abnormal?'● 持续高负载':'正常';tr.appendChild(diagnosis);body.appendChild(tr);
    })}
    function render(data){
      el('analysisPill').textContent='性能分析：'+(data.analysisEnabled?'已启用':'已停用');el('updatedAt').textContent='更新于 '+data.updatedAt;el('liveDot').className='dot '+(data.analysisEnabled?'live':'');
      el('rate').textContent=fmt(data.totalOperationsPerSecond);el('cpu').textContent=percent(data.totalThreadCpuPercent);el('running').textContent=String(data.runningCount||0);el('abnormal').textContent=String(data.abnormalCount||0);
      const notice=el('notice');if(!data.analysisEnabled){notice.textContent='性能分析当前未启用。页面可以查看流程状态，但吞吐、CPU 和耗时指标需要在程序设置中启用后，于下次启动生效。';notice.className='notice show danger'}else{notice.className='notice'}
      el('diagnosticPolicy').textContent='智能诊断状态：'+(data.runtimeDiagnosticsEnabled?'已启用':'已停用');el('tableSummary').textContent=` · ${data.processes.length} 个流程 · 累计 ${fmt(data.totalOperations)} 条指令`;
      renderRows(data.processes);pushHistory(state.rate,data.totalOperationsPerSecond);pushHistory(state.cpu,data.totalThreadCpuPercent);drawChart(el('rateChart'),state.rate,'#29a8c7','');drawChart(el('cpuChart'),state.cpu,'#c47b16','%');
    }
    el('resetHistory').addEventListener('click',()=>{state.rate=[];state.cpu=[];drawChart(el('rateChart'),state.rate,'#29a8c7','');drawChart(el('cpuChart'),state.cpu,'#c47b16','%')});
    window.addEventListener('resize',()=>{drawChart(el('rateChart'),state.rate,'#29a8c7','');drawChart(el('cpuChart'),state.cpu,'#c47b16','%')});
    if(window.chrome&&chrome.webview){chrome.webview.addEventListener('message',event=>{let data=event.data;if(typeof data==='string'){try{data=JSON.parse(data)}catch{return}}if(data&&data.type==='performanceSnapshot')render(data)});chrome.webview.postMessage(JSON.stringify({action:'ready'}))}
  </script>
</body>
</html>
